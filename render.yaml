databases:
  - name: safeshield-db
    plan: basic-256mb

services:
  - type: web
    name: safeshield-api
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: safeshield-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://safeshield-web.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://safeshield-web.onrender.com
      - key: GOOGLE_REDIRECT_URI
        value: https://safeshield-api.onrender.com/login/oauth2/code/google
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: BACKUP_AI_KEY
        sync: false
      - key: LAW_API_OC
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false

  - type: web
    name: safeshield-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://safeshield-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
