server.port=${PORT:8080}
server.max-http-request-header-size=64KB

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./safeshield-db;AUTO_SERVER=TRUE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

jwt.secret=${JWT_SECRET}
ai.backup-key=${BACKUP_AI_KEY:}
groq.api-key=${GROQ_API_KEY:}
groq.model=${GROQ_MODEL:llama-3.1-8b-instant}
groq.max-completion-tokens=${GROQ_MAX_COMPLETION_TOKENS:900}
gemini.api-key=${GEMINI_API_KEY:}
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.model=${DEEPSEEK_MODEL:deepseek-v4-flash}
deepseek.max-tokens=${DEEPSEEK_MAX_TOKENS:900}
law.api.oc=${LAW_API_OC:}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-authentication-method=client_secret_post
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}
